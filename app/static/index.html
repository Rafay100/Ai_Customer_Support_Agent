<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Support - Dark Mode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            padding: 20px;
            color: #f1f5f9;
        }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 968px) { .container { grid-template-columns: 1fr; } }
        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        h1 { text-align: center; color: #818cf8; margin-bottom: 30px; font-size: 36px; }
        h2 { color: #f1f5f9; margin-bottom: 20px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #f1f5f9; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #334155;
            border-radius: 12px;
            font-size: 16px;
            background: #334155;
            color: #f1f5f9;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }
        .form-group textarea { min-height: 120px; resize: vertical; }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(99, 102, 241, 0.5); }
        .chat-container {
            background: #0f172a;
            border-radius: 16px;
            padding: 20px;
            height: 500px;
            overflow-y: auto;
            border: 2px solid #334155;
        }
        .message { margin-bottom: 20px; display: flex; gap: 12px; }
        .message.user { flex-direction: row-reverse; }
        .avatar {
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .message.ai .avatar { background: linear-gradient(135deg, #6366f1, #818cf8); }
        .message.user .avatar { background: linear-gradient(135deg, #ec4899, #f5576c); }
        .message-content {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
        }
        .message.ai .message-content {
            background: rgba(99, 102, 241, 0.2);
            border: 2px solid rgba(99, 102, 241, 0.4);
            border-bottom-left-radius: 6px;
            color: #f1f5f9;
        }
        .message.user .message-content {
            background: rgba(236, 72, 153, 0.2);
            border: 2px solid rgba(236, 72, 153, 0.4);
            border-bottom-right-radius: 6px;
            color: #f1f5f9;
        }
        .response-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        .response-box.success { background: rgba(16, 185, 129, 0.2); border: 2px solid #10b981; color: #f1f5f9; }
        .response-box.escalated { background: rgba(245, 158, 11, 0.2); border: 2px solid #f59e0b; color: #f1f5f9; }
        .status-badge {
            display: inline-block;
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid rgba(16, 185, 129, 0.4);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 14px;
            margin-top: 15px;
        }
        .footer { text-align: center; margin-top: 40px; color: #94a3b8; }
        .quick-btn {
            padding: 10px 16px;
            background: rgba(99, 102, 241, 0.2);
            border: 2px solid rgba(99, 102, 241, 0.4);
            border-radius: 10px;
            color: #818cf8;
            cursor: pointer;
            margin: 5px;
        }
        .quick-btn:hover { background: #6366f1; color: white; }
    </style>
</head>
<body>
    <h1>🤖 AI Support Hub</h1>
    <div class="container">
        <div class="card">
            <h2>💬 Start Conversation</h2>
            <form id="supportForm">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="name" required placeholder="Your name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="subject" required placeholder="What's this about?">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="message" required placeholder="Type your message..."></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">🚀 Send Message</button>
                <div style="margin-top: 15px;">
                    <span style="color: #64748b; font-size: 13px;">Quick test:</span>
                    <button type="button" class="quick-btn" onclick="fillForm('shipping')">📦 Shipping</button>
                    <button type="button" class="quick-btn" onclick="fillForm('return')">↩️ Return</button>
                    <button type="button" class="quick-btn" onclick="fillForm('payment')">💳 Payment</button>
                    <button type="button" class="quick-btn" onclick="fillForm('track')">📍 Track</button>
                </div>
            </form>
            <div class="response-box" id="responseBox">
                <h3 id="responseTitle" style="margin-bottom: 10px;"></h3>
                <p id="responseMessage"></p>
                <p style="margin-top: 10px; font-size: 13px;"><strong>Ticket #</strong><span id="ticketId"></span></p>
            </div>
        </div>
        <div class="card">
            <h2>💬 Live Chat</h2>
            <div class="chat-container" id="chatMessages">
                <div class="message ai">
                    <div class="avatar">🤖</div>
                    <div class="message-content">Hi! I'm your AI assistant. How can I help?</div>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">Built with ❤️ by Syed Abdul Rafay</div>

    <script>
        function fillForm(type) {
            const data = {
                'shipping': 'How long does shipping take?',
                'return': 'What is your return policy?',
                'payment': 'What payment methods do you accept?',
                'track': 'How can I track my order?'
            };
            document.getElementById('message').value = data[type];
            document.getElementById('subject').value = type.charAt(0).toUpperCase() + type.slice(1);
        }

        document.getElementById('supportForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const responseBox = document.getElementById('responseBox');
            const chat = document.getElementById('chatMessages');
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };
            
            // Add user message to chat
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerHTML = '<div class="avatar">👤</div><div class="message-content">' + formData.message + '</div>';
            chat.appendChild(userMsg);
            chat.scrollTop = chat.scrollHeight;
            
            btn.disabled = true;
            btn.textContent = '⏳ Sending...';
            responseBox.style.display = 'none';
            
            try {
                const response = await fetch('/api/web-form', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                // Add AI response to chat
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message ai';
                aiMsg.innerHTML = '<div class="avatar">🤖</div><div class="message-content">' + (result.ai_response || 'Thank you!') + '</div>';
                chat.appendChild(aiMsg);
                chat.scrollTop = chat.scrollHeight;
                
                // Show response box
                responseBox.style.display = 'block';
                if (result.escalated) {
                    responseBox.className = 'response-box escalated';
                    document.getElementById('responseTitle').textContent = '👨‍💼 Escalated to Human';
                } else {
                    responseBox.className = 'response-box success';
                    document.getElementById('responseTitle').textContent = '🤖 AI Response';
                }
                document.getElementById('responseMessage').textContent = result.ai_response || 'Thank you!';
                document.getElementById('ticketId').textContent = result.ticket_id;
                
                document.getElementById('supportForm').reset();
            } catch (error) {
                responseBox.style.display = 'block';
                responseBox.className = 'response-box escalated';
                document.getElementById('responseTitle').textContent = '❌ Error';
                document.getElementById('responseMessage').textContent = error.message;
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Send Message';
            }
        });
    </script>
</body>
</html>
